<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPACE WARS — by IAN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
:root{
  --neon-purple:#b44fff;--neon-pink:#ff2d9b;--neon-cyan:#00ffe7;--neon-blue:#2979ff;
  --neon-green:#39ff14;--neon-orange:#ff6d00;--neon-yellow:#ffe600;--neon-red:#ff1744;
  --dark:#04000e;--dark2:#080018;--panel-bg:rgba(4,0,18,0.97);
  --border:rgba(180,79,255,0.4);--text:#e0d4ff;--sub:#7c5fa0;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--dark);color:var(--text);font-family:'Rajdhani',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden;}
#game-container{position:relative;width:100%;max-width:100vw;height:100vh;display:flex;flex-direction:column;}
#top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:linear-gradient(90deg,#04000e,#100025,#04000e);border-bottom:1px solid var(--border);z-index:100;}
#user-info{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:background 0.2s;}
#user-info:hover{background:rgba(180,79,255,0.1);}
#user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--neon-purple),var(--neon-cyan));display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid var(--neon-purple);}
#user-name{font-family:'Orbitron',monospace;font-size:12px;color:var(--neon-cyan);letter-spacing:1px;}
.top-btns{display:flex;gap:8px;align-items:center;}
.top-btn{background:rgba(180,79,255,0.1);border:1px solid rgba(180,79,255,0.3);border-radius:6px;padding:6px 12px;color:var(--text);font-size:11px;cursor:pointer;transition:all 0.2s;font-family:'Orbitron',monospace;}
.top-btn:hover{background:rgba(180,79,255,0.2);border-color:var(--neon-purple);}
#hud{display:flex;justify-content:space-between;align-items:center;width:100%;padding:6px 12px;background:linear-gradient(90deg,#04000e,#100025,#04000e);border-bottom:1px solid var(--border);font-family:'Orbitron',monospace;font-size:10px;letter-spacing:1px;}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-label{font-size:8px;color:var(--sub);letter-spacing:2px;}
.hud-val{color:#fff;font-weight:700;font-size:12px;}
.hud-coins{color:var(--neon-yellow);}
.hud-lives{color:var(--neon-pink);}
#canvas-wrapper{flex:1;display:flex;align-items:center;justify-content:center;position:relative;background:var(--dark);}
canvas{display:block;border:1px solid var(--border);cursor:none;touch-action:none;box-shadow:0 0 60px rgba(180,79,255,0.15);}
#msg-bar{width:100%;text-align:center;font-size:11px;color:var(--neon-cyan);min-height:20px;padding:4px 0;font-family:'Orbitron',monospace;letter-spacing:1px;text-shadow:0 0 8px var(--neon-cyan);background:linear-gradient(90deg,#04000e,#100025,#04000e);border-top:1px solid var(--border);}
#overlay{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:1000;background:rgba(0,0,0,0.7);}
.panel{pointer-events:all;background:var(--panel-bg);border:1px solid var(--border);border-radius:20px;padding:24px 28px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--neon-purple) var(--dark2);box-shadow:0 0 60px rgba(180,79,255,0.3);animation:panelIn 0.2s ease;}
@keyframes panelIn{from{opacity:0;transform:scale(0.96);}to{opacity:1;transform:scale(1);}}
.panel-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;text-align:center;letter-spacing:4px;margin-bottom:4px;background:linear-gradient(90deg,var(--neon-pink),var(--neon-purple),var(--neon-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.panel-sub{text-align:center;font-size:11px;color:var(--sub);margin-bottom:14px;letter-spacing:1px;}
.btn{display:block;width:100%;padding:10px 14px;margin:5px 0;background:linear-gradient(90deg,rgba(180,79,255,0.06),rgba(0,255,231,0.04));border:1px solid rgba(180,79,255,0.3);border-radius:10px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;text-align:center;letter-spacing:1px;position:relative;overflow:hidden;}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(180,79,255,0.1),transparent);transform:translateX(-100%);transition:transform 0.4s;}
.btn:hover::after{transform:translateX(100%);}
.btn:hover{border-color:var(--neon-purple);color:#fff;box-shadow:0 0 16px rgba(180,79,255,0.3);}
.btn.primary{border-color:var(--neon-cyan);background:linear-gradient(90deg,rgba(0,255,231,0.08),rgba(180,79,255,0.08));color:var(--neon-cyan);font-weight:700;letter-spacing:2px;box-shadow:0 0 20px rgba(0,255,231,0.15);}
.btn.primary:hover{box-shadow:0 0 30px rgba(0,255,231,0.3);}
.btn.danger{border-color:var(--neon-red);color:var(--neon-red);}
.btn.success{border-color:var(--neon-green);color:var(--neon-green);}
.sec{font-size:9px;color:var(--neon-purple);letter-spacing:2px;text-transform:uppercase;margin:12px 0 6px;border-top:1px solid rgba(180,79,255,0.15);padding-top:10px;font-family:'Orbitron',monospace;}
.row{display:flex;align-items:center;padding:8px 10px;border:1px solid rgba(180,79,255,0.2);border-radius:8px;margin:4px 0;gap:8px;background:rgba(180,79,255,0.05);transition:border-color 0.15s;}
.row:hover{border-color:rgba(180,79,255,0.4);}
.row-name{flex:1;font-size:13px;color:#fff;font-weight:600;}
.row-desc{font-size:10px;color:var(--sub);display:block;margin-top:2px;}
.row-cost{color:var(--neon-yellow);font-size:11px;font-family:'Orbitron',monospace;white-space:nowrap;}
.ibtn{padding:4px 10px;font-size:10px;border:1px solid rgba(180,79,255,0.4);border-radius:6px;background:transparent;color:var(--neon-purple);cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;white-space:nowrap;transition:all 0.12s;}
.ibtn:hover:not(:disabled){background:rgba(180,79,255,0.15);border-color:var(--neon-purple);color:#fff;}
.ibtn:disabled{color:#2d1a4a;cursor:default;border-color:#1a0d33;}
.ibtn.owned{color:var(--neon-green);border-color:var(--neon-green);}
.close-btn{float:right;background:none;border:none;color:var(--sub);cursor:pointer;font-size:18px;line-height:1;transition:color 0.1s;}
.close-btn:hover{color:var(--neon-pink);}
input[type=text]{background:rgba(180,79,255,0.05);border:1px solid rgba(180,79,255,0.4);border-radius:8px;color:var(--neon-cyan);padding:8px 12px;font-size:13px;width:100%;outline:none;margin:5px 0;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}
input[type=text]:focus{border-color:var(--neon-pink);box-shadow:0 0 12px rgba(255,45,155,0.2);}
.tab{padding:6px 12px;font-size:10px;border:1px solid rgba(180,79,255,0.25);border-radius:6px;background:transparent;color:var(--sub);cursor:pointer;font-family:'Orbitron',monospace;transition:all 0.12s;margin:2px;}
.tab:hover,.tab.active{border-color:var(--neon-purple);color:var(--neon-purple);background:rgba(180,79,255,0.1);}
.r-common{color:#a78bfa;}.r-rare{color:#38bdf8;}.r-epic{color:#c084fc;}.r-legendary{color:var(--neon-yellow);}.r-mythic{background:linear-gradient(90deg,#ff1744,#e879f9,#818cf8,#00ffe7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:800;}.r-divine{background:linear-gradient(90deg,#ffe600,#ff6d00,#ff1744,#ff2d9b,#b44fff,#00ffe7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:900;}
.ship-mini{border-radius:6px;background:rgba(180,79,255,0.08);border:1px solid rgba(180,79,255,0.2);flex-shrink:0;}
.diff-btn{display:inline-block;padding:8px 16px;margin:4px;border:2px solid;border-radius:8px;cursor:pointer;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;transition:all 0.2s;}
.diff-btn.easy{border-color:#4ade80;color:#4ade80;}.diff-btn.normal{border-color:#60a5fa;color:#60a5fa;}.diff-btn.hard{border-color:#f97316;color:#f97316;}.diff-btn.insane{border-color:#dc2626;color:#dc2626;}.diff-btn.impossible{border-color:#a855f7;color:#a855f7;}
.diff-btn:hover,.diff-btn.selected{box-shadow:0 0 20px currentColor;transform:scale(1.05);}
#save-ind{position:fixed;bottom:12px;right:12px;background:rgba(4,0,18,0.95);border:1px solid var(--neon-green);border-radius:8px;padding:6px 12px;font-size:10px;color:var(--neon-green);opacity:0;transition:opacity 0.5s;pointer-events:none;z-index:999;font-family:'Orbitron',monospace;}
.friend-item{padding:8px;border:1px solid rgba(180,79,255,0.2);border-radius:6px;margin:4px 0;display:flex;align-items:center;gap:8px;background:rgba(180,79,255,0.03);}
.friend-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));display:flex;align-items:center;justify-content:center;font-size:12px;}
.lb-entry{padding:8px 12px;border:1px solid rgba(180,79,255,0.15);border-radius:6px;margin:3px 0;display:flex;justify-content:space-between;align-items:center;background:rgba(180,79,255,0.03);}
.lb-rank{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--neon-yellow);min-width:30px;}
@media (max-width: 768px){
  .panel{padding:18px 20px;max-width:95%;}
  .panel-title{font-size:18px;}
  #hud{font-size:9px;}
}
</style>
</head>
<body>
<div id="game-container">
  <div id="top-bar">
    <div id="user-info" onclick="showPanel('profile')">
      <div id="user-avatar">👤</div>
      <span id="user-name">Guest</span>
    </div>
    <div class="top-btns">
      <button class="top-btn" onclick="showPanel('friends')">👥 Friends</button>
      <button class="top-btn" onclick="showPanel('leaderboard')">🏆 Leaderboard</button>
      <button class="top-btn" onclick="showPanel('settings')">⚙ Settings</button>
      <button class="top-btn" onclick="toggleSound()" id="sound-btn">🔊</button>
      <button class="top-btn" onclick="toggleMusic()" id="music-btn">🎵</button>
    </div>
  </div>
  <div id="hud">
    <div class="hud-item"><span class="hud-label">SCORE</span><span class="hud-val" id="h-score">0</span></div>
    <div class="hud-item"><span class="hud-label">GOLD</span><span class="hud-val hud-coins" id="h-gold">★0</span></div>
    <div class="hud-item"><span class="hud-label">LEVEL</span><span class="hud-val" id="h-level">1</span></div>
    <div class="hud-item"><span class="hud-label">LIVES</span><span class="hud-val hud-lives" id="h-lives">♥♥♥</span></div>
    <div class="hud-item"><span class="hud-label">SHIP</span><span class="hud-val" id="h-ship" style="font-size:9px;">VIPER</span></div>
    <div class="hud-item"><span class="hud-label">DIFF</span><span class="hud-val" id="h-diff" style="font-size:9px;">NORMAL</span></div>
  </div>
  <div id="canvas-wrapper">
    <canvas id="cv"></canvas>
    <div id="overlay"></div>
  </div>
  <div id="msg-bar"></div>
</div>
<div id="save-ind">💾 SAVED</div>

<script>
// ═══════════════════════════════════════════════════════════
//  IAN'S SPACE WARS v7 — ULTIMATE EDITION
// ═══════════════════════════════════════════════════════════

const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
let W, H, canvasScale = 1;

// Settings
let settings = {
  resolution: 'auto', // auto, 720p, 1080p, 1440p
  difficulty: 'normal',
  controlScheme: 'mouse' // mouse, keyboard, touch
};

// Initialize canvas with responsive sizing
function initCanvas() {
  const wrapper = document.getElementById('canvas-wrapper');
  const wrapperWidth = wrapper.clientWidth;
  const wrapperHeight = wrapper.clientHeight;
  
  if (settings.resolution === 'auto') {
    W = Math.min(wrapperWidth, 1200);
    H = Math.min(wrapperHeight, 800);
  } else {
    const resMap = {
      '720p': [1280, 720],
      '1080p': [1920, 1080],
      '1440p': [2560, 1440]
    };
    [W, H] = resMap[settings.resolution] || [1280, 720];
    const aspectRatio = W / H;
    if (wrapperWidth / wrapperHeight > aspectRatio) {
      H = wrapperHeight;
      W = H * aspectRatio;
    } else {
      W = wrapperWidth;
      H = W / aspectRatio;
    }
  }
  
  cv.width = W;
  cv.height = H;
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
}

initCanvas();
window.addEventListener('resize', () => {
  initCanvas();
  rebuildBg();
  initStars();
});

// Username System
const adjectives = ['Murky','Swift','Gray','Dark','Bright','Shadow','Neon','Cyber','Stellar','Cosmic','Phantom','Mystic','Thunder','Lightning','Crystal','Diamond','Titanium','Steel','Iron','Silver','Golden','Ruby','Emerald','Sapphire','Plasma'];
const nouns = ['Garlic','Mark','Wolf','Hawk','Tiger','Dragon','Phoenix','Eagle','Falcon','Raven','Storm','Blaze','Frost','Nova','Comet','Star','Galaxy','Nebula','Vortex','Warrior','Hunter','Ranger','Knight','Pilot','Commander'];

function generateUsername() {
  const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
  const noun = nouns[Math.floor(Math.random() * nouns.length)];
  const num = Math.floor(Math.random() * 100);
  return adj + noun + num;
}

let username = generateUsername();
let userAvatar = '👤';

// Load user data
function loadUserData() {
  try {
    const data = JSON.parse(localStorage.getItem('spaceWarsUser') || '{}');
    if (data.username) username = data.username;
    if (data.avatar) userAvatar = data.avatar;
    document.getElementById('user-name').textContent = username;
    document.getElementById('user-avatar').textContent = userAvatar;
  } catch(e) {}
}

function saveUserData() {
  try {
    localStorage.setItem('spaceWarsUser', JSON.stringify({username, avatar: userAvatar}));
  } catch(e) {}
}

loadUserData();

// Difficulty Settings
const DIFF_SETTINGS = {
  easy: {mult: 0.6, enemySpeed: 0.7, fireRate: 1.5, damage: 0.7, coins: 1.5},
  normal: {mult: 1, enemySpeed: 1, fireRate: 1, damage: 1, coins: 1},
  hard: {mult: 1.5, enemySpeed: 1.3, fireRate: 0.7, damage: 1.4, coins: 1.2},
  insane: {mult: 2.5, enemySpeed: 1.6, fireRate: 0.5, damage: 2, coins: 1.5},
  impossible: {mult: 4, enemySpeed: 2, fireRate: 0.3, damage: 3, coins: 2}
};

// ── AUDIO ────────────────────────────────────────────────
let AC, sfxOn = true, musicOn = true;
function initAC(){
  if(AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
}
function tone(freq, dur, type='sine', vol=0.12){
  if(!sfxOn || !AC) return;
  try{
    const o=AC.createOscillator(), g=AC.createGain(), t=AC.currentTime;
    o.connect(g); g.connect(AC.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur);
  }catch(e){}
}
function sfxShoot(){ tone(920,0.07,'square',0.05); }
function sfxBoom(){ tone(60,0.4,'sawtooth',0.18); }
function sfxPick(){ [500,700,900].forEach((f,i)=>tone(f,0.08,'sine',0.08)); }
function sfxLvl(){ [300,500,700].forEach((f,i)=>tone(f,0.12,'sine',0.07)); }
function sfxHit(){ tone(180,0.12,'square',0.1); }

let musicInterval = null;
const MUSIC_NOTES = [[55,110],[55,110],[82,82],[110,55],[73,73],[55,110],[65,130],[82,82]];
function startMusic(){
  if(!musicOn || !AC || musicInterval) return;
  let beat = 0;
  musicInterval = setInterval(()=>{
    const [f1,f2] = MUSIC_NOTES[beat % MUSIC_NOTES.length];
    try{
      const o=AC.createOscillator(), g=AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.type='sine'; o.frequency.value=f1;
      g.gain.setValueAtTime(0.03,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.4);
      o.start(); o.stop(AC.currentTime+0.4);
    }catch(e){}
    beat++;
  }, 500);
}
function stopMusic(){ clearInterval(musicInterval); musicInterval=null; }
function toggleSound(){
  sfxOn=!sfxOn;
  document.getElementById('sound-btn').textContent = sfxOn?'🔊':'🔇';
}
function toggleMusic(){
  musicOn=!musicOn;
  document.getElementById('music-btn').textContent = musicOn?'🎵':'🎵';
  if(musicOn){ initAC(); startMusic(); } else stopMusic();
}

// ── SAVE / LOAD ──────────────────────────────────────────
const SK = 'ianSpaceWarsV7';
function saveGame(){
  try{
    localStorage.setItem(SK, JSON.stringify({
      coins: totalCoins, ups: {...ups},
      ships: SHIPS.map(s=>({id:s.id,owned:s.owned})),
      activeId: activeShip.id, hi: hiScore, wins: tournWins,
      settings, friends, leaderboard: getLeaderboard()
    }));
    const el=document.getElementById('save-ind');
    el.style.opacity='1'; setTimeout(()=>el.style.opacity='0',1800);
  }catch(e){console.error('Save failed:', e);}
}
function loadGame(){
  try{
    const d=JSON.parse(localStorage.getItem(SK)||'{}');
    if(d.coins) totalCoins=d.coins;
    if(d.ups) Object.assign(ups,d.ups);
    if(d.ships) d.ships.forEach(s=>{const sh=SHIPS.find(x=>x.id===s.id);if(sh)sh.owned=s.owned;});
    if(d.activeId){const s=SHIPS.find(x=>x.id===d.activeId);if(s&&s.owned)activeShip=s;}
    if(d.hi) hiScore=d.hi;
    if(d.wins) tournWins=d.wins;
    if(d.settings) Object.assign(settings, d.settings);
    if(d.friends) friends = d.friends;
    if(d.leaderboard) updateLeaderboard(d.leaderboard);
  }catch(e){console.error('Load failed:', e);}
}
let autoST=null;
function schedSave(){ clearTimeout(autoST); autoST=setTimeout(saveGame,2000); }

// ── SHIPS ────────────────────────────────────────────────
const SHIPS = [
  {id:'viper',name:'Viper',r:'common',cost:0,owned:true,spd:5,fire:1,sh:0,hp:3,desc:'Balanced starter',col:'#4eb8ff',acc:'#38bdf8'},
  {id:'hornet',name:'Hornet',r:'common',cost:200,owned:false,spd:6.5,fire:1.2,sh:0,hp:2,desc:'Speed fighter',col:'#39ff14',acc:'#86efac'},
  {id:'corsair',name:'Corsair',r:'rare',cost:1200,owned:false,spd:5.5,fire:1.5,sh:1,hp:3,desc:'Combat raider',col:'#60a5fa',acc:'#93c5fd'},
  {id:'titan',name:'Titan',r:'epic',cost:4000,owned:false,spd:3.2,fire:0.9,sh:5,hp:6,desc:'Heavy cruiser',col:'#fb923c',acc:'#fed7aa'},
  {id:'specter',name:'Specter',r:'legendary',cost:12000,owned:false,spd:9,fire:1.1,sh:0,hp:2,desc:'Fastest alive',col:'#e879f9',acc:'#f0abfc'},
  {id:'omega',name:'OMEGA',r:'divine',cost:200000,owned:false,spd:8,fire:5.0,sh:10,hp:12,desc:'Ultimate weapon',col:'#fff',acc:'#00ffe7'},
  {id:'ianship',name:'IAN\'S SHIP',r:'divine',cost:0,owned:true,spd:9.9,fire:6.0,sh:15,hp:20,desc:'Commander vessel',col:'#ff2d9b',acc:'#00ffe7'},
];
let activeShip = SHIPS[0];

// ── UPGRADES ─────────────────────────────────────────────
let ups = {triple:false,laser:false,shield:false,speed:false,bombs:0,nukes:0,lives:0};
let totalCoins=0, hiScore=0, score=0, lives=3, level=1;

const UP_LIST = [
  {id:'triple',name:'Triple Shot',desc:'3 bullets per burst',cost:500},
  {id:'laser',name:'Laser Beam',desc:'Hold Z for beam',cost:2500},
  {id:'shield',name:'Shield Mk1',desc:'3 extra hits',cost:3000},
  {id:'speed',name:'Overdrive',desc:'Speed boost',cost:2000},
  {id:'bombs',name:'Bomb ×1',desc:'Screen clear',cost:800},
  {id:'nukes',name:'Nuke ×1',desc:'Boss killer',cost:10000},
  {id:'lives',name:'Extra Life',desc:'+1 life',cost:5000},
];

// ── MULTIPLAYER (Local 2P) ───────────────────────────────
let multiplayerMode = false;
let player2 = null;

// ── FRIENDS & LEADERBOARD ─────────────────────────────────
let friends = [];
let leaderboard = [];

function addFriend(name) {
  if(!friends.find(f=>f.name===name)){
    friends.push({name, avatar:'👤', status:'online', score:Math.floor(Math.random()*50000)});
    schedSave();
  }
}

function removeFriend(name){
  friends = friends.filter(f=>f.name!==name);
  schedSave();
}

function updateLeaderboard(newEntry) {
  if(Array.isArray(newEntry)) {
    leaderboard = newEntry;
  } else {
    leaderboard.push(newEntry);
    leaderboard.sort((a,b)=>b.score-a.score);
    leaderboard = leaderboard.slice(0,50);
  }
}

function getLeaderboard() {
  return leaderboard;
}

function submitScore(score, diff) {
  updateLeaderboard({name:username, score, difficulty:diff, date:Date.now()});
  schedSave();
}

// Initialize friends & leaderboard with sample data
if(friends.length === 0) {

// ── BACKGROUND ───────────────────────────────────────────
const BGTX={
  nebula:{base:'#04000e',clouds:['#2d006688','#1e003388','#3b007755'],sc:['#ddd6fe','#a78bfa','#4c1d95']},
  neon:{base:'#00030a',clouds:['#00ff8844','#00ffe744','#0080ff44'],sc:['#00ffe7','#39ff14','#00bfff']},
};
let customBg='nebula', nebulaCanvas=null;
function rebuildBg(){
  const t=BGTX[customBg]||BGTX.nebula;
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const g=c.getContext('2d');
  g.fillStyle=t.base;g.fillRect(0,0,W,H);
  const pts=[[W*.18,H*.3,220],[W*.82,H*.65,180],[W*.5,H*.12,150]];
  pts.forEach(([x,y,r],i)=>{
    const gr=g.createRadialGradient(x,y,0,x,y,r);
    gr.addColorStop(0,t.clouds[i]||'transparent');gr.addColorStop(1,'transparent');
    g.fillStyle=gr;g.beginPath();g.arc(x,y,r,0,Math.PI*2);g.fill();
  });
  nebulaCanvas=c;
}
rebuildBg();

function starColor(bright){
  const t=BGTX[customBg]||BGTX.nebula;
  return bright>.8?t.sc[0]:bright>.5?t.sc[1]:t.sc[2];
}

// ── SPRITES ──────────────────────────────────────────────
function makePlayerCanvas(ship){
  const c=document.createElement('canvas');c.width=60;c.height=66;
  const g=c.getContext('2d');
  g.fillStyle=ship.col;
  g.beginPath();g.moveTo(30,2);g.lineTo(54,58);g.lineTo(30,46);g.lineTo(6,58);g.closePath();g.fill();
  g.fillStyle=ship.acc+'77';
  g.beginPath();g.moveTo(6,58);g.lineTo(0,44);g.lineTo(17,41);g.closePath();g.fill();
  g.beginPath();g.moveTo(54,58);g.lineTo(60,44);g.lineTo(43,41);g.closePath();g.fill();
  return c;
}

function makeEnemyCanvas(type){
  const c=document.createElement('canvas');c.width=50;c.height=44;
  const g=c.getContext('2d');
  g.fillStyle='#7c3aed';
  g.beginPath();g.moveTo(25,2);g.lineTo(48,38);g.lineTo(25,30);g.lineTo(2,38);g.closePath();g.fill();
  return c;
}

function makeBossCanvas(){
  const c=document.createElement('canvas');c.width=110;c.height=80;
  const g=c.getContext('2d');
  g.fillStyle='#3b0764';
  g.beginPath();g.ellipse(55,40,52,32,0,0,Math.PI*2);g.fill();
  return c;
}

let playerSprite = makePlayerCanvas(activeShip);
const enemySprites = [makeEnemyCanvas(0)];
const bossCanvas = makeBossCanvas();

// ── GAME STATE ───────────────────────────────────────────
let gameState='menu', tournWins=0;
let player=null, enemies=[], bullets=[], enemyBullets=[], explosions=[], particles=[], powerups=[], boss=null;
let bgStars=[], bgScrollY=0, frame=0, animId=null, coinsRun=0;
let screenShake=0, shakeX=0, shakeY=0, keys={}, mouseX=W/2, mouseY=H/2, isTouching=false;

function initStars(){
  bgStars=Array.from({length:Math.floor(W*H/5000)},()=>({
    x:Math.random()*W,y:Math.random()*H*2,
    r:Math.random()*2+.2,speed:Math.random()*.6+.1,
    bright:Math.random(),tw:Math.random()*Math.PI*2
  }));
}

function updateHUD(){
  document.getElementById('h-score').textContent=score.toLocaleString();
  document.getElementById('h-gold').textContent='★'+totalCoins.toLocaleString();
  document.getElementById('h-level').textContent=level;

}
function setMsg(t){ document.getElementById('msg-bar').textContent=t; }

// ── WAVE SPAWNING ─────────────────────────────────────────
function spawnWave(){
  const diff = DIFF_SETTINGS[settings.difficulty];
  if(level%5===0){spawnBoss();return;}
  const cols=Math.min(5+Math.floor(level/2),10);
  const rows=Math.min(2+Math.floor(level/3),5);
  const gap=Math.floor((W-80)/cols);
  for(let r=0;r<rows;r++)
    for(let c=0;c<cols;c++){
      enemies.push({
        x:40+c*gap+gap/2,
        y:26+r*52,
        w:50,h:44,
        hp:Math.ceil((1+Math.floor(level/3))*diff.mult),
        maxHp:Math.ceil((1+Math.floor(level/3))*diff.mult),
        type:0,
        dx:(level%2===0?-1:1)*(0.7+level*.055)*diff.enemySpeed,
        dy:0.12+level*.015, // Fixed: slower downward movement
        wobble:Math.random()*Math.PI*2
      });
    }
}

function spawnBoss(){
  const diff = DIFF_SETTINGS[settings.difficulty];
  boss={
    x:W/2,y:94,w:110,h:80,
    hp:Math.ceil((60+level*12)*diff.mult),
    maxHp:Math.ceil((60+level*12)*diff.mult),
    dx:1.2+level*.055,phase:0
  };
  setMsg('⚠ BOSS INCOMING!');
}

function killBoss(){
  if(!boss)return;
  const diff = DIFF_SETTINGS[settings.difficulty];
  explosions.push({x:boss.x,y:boss.y,life:1,maxR:60});
  sfxBoom();
  const reward = Math.ceil(25*diff.coins);
  score+=Math.ceil(600*level*diff.mult);
  coinsRun+=reward;
  totalCoins+=reward;
  boss=null;
  screenShake=16;
  updateHUD();
  schedSave();
  setTimeout(()=>{
    if(gameState==='play'){level++;updateHUD();spawnWave();sfxLvl();}
  },1300);
}

// ── MAIN GAME LOOP ────────────────────────────────────────
function resetGame(){
  playerSprite=makePlayerCanvas(activeShip);
  score=0;coinsRun=0;
  lives=activeShip.hp+(ups.lives||0);
  level=1;frame=0;
  const spd=activeShip.spd*(ups.speed?1.4:1);
  player={
    x:W/2,y:H-95,w:60,h:66,speed:spd,invincible:0,
    shieldHp:activeShip.sh+(ups.shield?3:0),
    bombs:ups.bombs||0,nukes:ups.nukes||0
  };
  bullets=[];enemies=[];enemyBullets=[];explosions=[];particles=[];powerups=[];boss=null;
  screenShake=0;
  spawnWave();
  updateHUD();
}

function gameLoop(){
  if(gameState!=='play')return;
  frame++;
  const diff = DIFF_SETTINGS[settings.difficulty];
  
  if(screenShake>0){
    shakeX=(Math.random()-.5)*screenShake;
    shakeY=(Math.random()-.5)*screenShake;
    screenShake*=.82;
    if(screenShake<.3){screenShake=0;shakeX=0;shakeY=0;}
  }
  
  cx.save();
  cx.translate(shakeX,shakeY);
  
  // Draw background
  cx.drawImage(nebulaCanvas,0,0,W,H);
  bgScrollY+=.18;
  bgStars.forEach(s=>{
    s.tw+=.03;const tw=.5+Math.sin(s.tw)*.5;
    const yd=(s.y+bgScrollY)%(H*2)-H*.5;
    cx.globalAlpha=tw*(.3+s.bright*.7);
    cx.fillStyle=starColor(s.bright);
    cx.beginPath();cx.arc(s.x,yd,s.r,0,Math.PI*2);cx.fill();
  });
  cx.globalAlpha=1;

  // Player movement - fixed to respect boundaries properly
  const spd=player.speed;
  if(keys['ArrowLeft']||keys['a'])player.x-=spd;
  if(keys['ArrowRight']||keys['d'])player.x+=spd;
  if(keys['ArrowUp']||keys['w'])player.y-=spd;
  if(keys['ArrowDown']||keys['s'])player.y+=spd;
  if(settings.controlScheme==='mouse'&&!isTouching){
    player.x+=(mouseX-player.x)*.1;
    player.y+=(mouseY-player.y)*.05;
  }
  player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x));
  player.y=Math.max(H*.2,Math.min(H-player.h/2,player.y));
  if(player.invincible>0)player.invincible--;

  // Draw player
  const pinv=(player.invincible>0)?(frame%6<3?.15:1):1;
  cx.save();cx.globalAlpha=pinv;cx.drawImage(playerSprite,player.x-30,player.y-33);cx.restore();

  // Shield visual
  if(player.shieldHp>0){
    cx.save();cx.globalAlpha=.4;
    cx.strokeStyle='#00ffe7';cx.lineWidth=2;
    cx.beginPath();cx.arc(player.x,player.y,30,0,Math.PI*2);cx.stroke();cx.restore();
  }

  // Fire bullets - fixed fire rate calculation
  const frate=Math.max(3,14-(level*.3))*(1/activeShip.fire)*diff.fireRate;
  if(frame%Math.max(3,Math.floor(frate))===0){
    bullets.push({x:player.x,y:player.y-33,h:22});
    if(ups.triple||level>=5){
      bullets.push({x:player.x-22,y:player.y-22,h:16});
      bullets.push({x:player.x+22,y:player.y-22,h:16});
    }
    sfxShoot();
  }

  // Update bullets
  bullets=bullets.filter(b=>{
    b.y-=11+level*.1;
    if(b.y<-30)return false;
    cx.fillStyle='#a855f7';
    cx.beginPath();cx.fillRect(b.x-2.5,b.y-b.h,5,b.h);cx.fill();
    let hit=false;
    enemies=enemies.filter(e=>{
      if(!hit&&Math.abs(b.x-e.x)<e.w/2&&b.y<e.y+e.h/2&&b.y>e.y-e.h/2){
        e.hp-=diff.damage;
        if(e.hp<=0){
          explosions.push({x:e.x,y:e.y,life:1,maxR:40});
          score+=Math.ceil(10*level*diff.mult);
          coinsRun++;
          sfxBoom();
          hit=true;
          if(Math.random()<.15) dropPowerup(e.x,e.y);
          updateHUD();
          return false;
        }
        hit=true;
      }
      return true;
    });
    if(!hit&&boss&&Math.abs(b.x-boss.x)<boss.w/2&&Math.abs(b.y-boss.y)<boss.h/2){
      boss.hp-=1*diff.damage;
      sfxHit();
      hit=true;
      if(boss.hp<=0)killBoss();
    }
    return !hit;
  });

  // Update enemies - FIXED to prevent instant death
  let revX=false;
  enemies.forEach(e=>{
    e.x+=e.dx;
    e.y+=e.dy; // Slowed down
    e.wobble+=.028;
    e.x+=Math.sin(e.wobble)*.45;
    if(e.x<e.w/2||e.x>W-e.w/2)revX=true;
    // Prevent going below screen too fast
    if(e.y>H-100){
      e.y=H-100;
      e.dy=0;
    }
  });
  if(revX)enemies.forEach(e=>{e.dx*=-1;e.y+=8;});

  // Draw enemies
  enemies.forEach(e=>{
    cx.drawImage(enemySprites[0],e.x-e.w/2,e.y-e.h/2);
    // Collision with player - fixed
    if(player.invincible===0&&Math.abs(e.x-player.x)<(e.w/2+player.w/2)*.6&&Math.abs(e.y-player.y)<(e.h/2+player.h/2)*.6){
      if(player.shieldHp>0){
        player.shieldHp--;
      }else{
        lives--;
        updateHUD();
        player.invincible=95;
        screenShake=9;
        explosions.push({x:player.x,y:player.y,life:1,maxR:52});
        if(lives<=0){
          cx.restore();
          endGame();
          return;
        }
      }
    }
  });

  // Boss
  if(boss){
    boss.x+=boss.dx;
    if(boss.x<boss.w/2||boss.x>W-boss.w/2)boss.dx*=-1;
    cx.drawImage(bossCanvas,boss.x-boss.w/2,boss.y-boss.h/2);
    // HP bar
    cx.fillStyle='#06000f';cx.fillRect(W/2-150,8,300,12);
    const br=Math.max(0,boss.hp/boss.maxHp);
    cx.fillStyle=br>.5?'#7c3aed':'#f87171';
    cx.fillRect(W/2-150,8,300*br,12);
    if(frame%40===0){
      const a=Math.atan2(player.y-boss.y,player.x-boss.x);
      enemyBullets.push({x:boss.x,y:boss.y+boss.h/2,ang:a,spd:4.5});
    }
  }

  // Enemy bullets
  enemyBullets=enemyBullets.filter(b=>{
    b.x+=Math.cos(b.ang)*b.spd*.38;
    b.y+=b.spd;
    if(b.y>H+22||b.x<-22||b.x>W+22)return false;
    cx.fillStyle='#c4b5fd';
    cx.beginPath();cx.arc(b.x,b.y,4.5,0,Math.PI*2);cx.fill();
    if(player.invincible===0&&Math.abs(b.x-player.x)<30&&Math.abs(b.y-player.y)<33){
      if(player.shieldHp>0){
        player.shieldHp--;
        return false;
      }
      lives--;
      updateHUD();
      player.invincible=95;
      screenShake=7;
      explosions.push({x:player.x,y:player.y,life:1,maxR:48});
      if(lives<=0){
        cx.restore();
        endGame();
        return false;
      }
      return false;
    }
    return true;
  });

  // Powerups
  powerups=powerups.filter(p=>{
    p.y+=p.dy;
    if(p.y>H+32)return false;
    cx.fillStyle='#ffe600';
    cx.beginPath();cx.arc(p.x,p.y,11,0,Math.PI*2);cx.fill();
    if(Math.abs(p.x-player.x)<26&&Math.abs(p.y-player.y)<26){
      applyPowerup(p.type);
      sfxPick();
      updateHUD();
      schedSave();
      return false;
    }
    return true;
  });

  // Explosions
  explosions=explosions.filter(ex=>{
    const t=1-ex.life,r=ex.maxR*t;
    cx.strokeStyle='#e879f9';
    cx.lineWidth=3;
    cx.beginPath();cx.arc(ex.x,ex.y,r,0,Math.PI*2);cx.stroke();
    ex.life-=.034;
    return ex.life>0;
  });

  // Wave completion
  if(enemies.length===0&&!boss){
    level++;
    updateHUD();
    spawnWave();
    setMsg('★ LEVEL '+level+'!');
    sfxLvl();
    schedSave();
  }

  cx.restore();
  animId=requestAnimationFrame(gameLoop);
}

function dropPowerup(x,y){
  const types=['shield','laser','bomb','coin','life'];
  powerups.push({x,y,dy:1.3,type:types[Math.floor(Math.random()*types.length)]});
}

function applyPowerup(type){
  switch(type){
    case 'life': lives=Math.min(12,lives+1);break;
    case 'shield': player.shieldHp=Math.min(10,player.shieldHp+2);break;
    case 'bomb': player.bombs++;break;
    case 'coin': coinsRun+=10;totalCoins+=10;break;
  }
}

function endGame(){
  gameState='idle';
  if(animId)cancelAnimationFrame(animId);
  stopMusic();
  const diff = DIFF_SETTINGS[settings.difficulty];
  const earned=Math.ceil((Math.floor(score/45)+coinsRun)*diff.coins);
  totalCoins+=earned;
  if(score>hiScore)hiScore=score;
  submitScore(score, settings.difficulty);
  updateHUD();
  schedSave();
  showGameover(false,'GAME OVER','Score: '+score.toLocaleString(),'Gold earned: ★'+earned,'');
}

  mf++;

    cx.fillStyle=starColor(s.bright);

            <div style="flex:1;">
              <div style="font-weight:700;color:${e.name===username?'var(--neon-cyan)':'#fff'};">${e.name}</div>
              <div style="font-size:10px;color:var(--sub);">${e.difficulty.toUpperCase()}</div>
            </div>
            <div style="font-family:'Orbitron',monospace;color:var(--neon-yellow);">${e.score.toLocaleString()}</div>
          </div>
        `).join('')}
      </div>
      <button class="btn" onclick="hideOverlay()">← CLOSE</button>
    `;
    default: return '<button class="btn" onclick="showPanel(\'menu\')">← BACK</button>';
  }
}

function showGameover(win, title, sub, coins, extra){
  overlay.innerHTML='';
  overlay.style.display='flex';
  const p=document.createElement('div');
  p.className='panel';
  p.innerHTML=`
    <div class="panel-title" style="color:${win?'var(--neon-green)':'#f87171'}">${title}</div>
    <div class="panel-sub">${sub}</div>
    <div style="text-align:center;margin:16px 0;">
      <div style="font-size:26px;color:var(--neon-yellow);">${extra||coins}</div>
    </div>
    <button class="btn primary" onclick="startGame()">▶ PLAY AGAIN</button>
    <button class="btn" onclick="showPanel('leaderboard')">🏆 LEADERBOARD</button>
    <button class="btn" onclick="showPanel('menu')">⬅ MENU</button>
  `;
  overlay.appendChild(p);
}

function renderHangar(panel){
  const el=panel.querySelector('#ship-list-container');
  if(!el)return;
  el.innerHTML='';
  SHIPS.forEach(s=>{
    const row=document.createElement('div');
    row.className='row';
    const mini=document.createElement('canvas');
    mini.className='ship-mini';
    mini.width=46;
    mini.height=46;
    const g2=mini.getContext('2d');
    g2.scale(.7,.7);
    const sp=makePlayerCanvas(s);
    g2.drawImage(sp,0,0);
    const equipped=activeShip.id===s.id;
    row.innerHTML=`
      <div style="flex:1;margin-left:8px;">
        <div class="r-${s.r}" style="font-size:13px;font-weight:700;">${s.name}</div>
        <div style="font-size:10px;color:var(--sub);">${s.desc}</div>
      </div>
      <span style="color:var(--neon-yellow);margin:0 6px;">${s.owned?'':'★'+s.cost.toLocaleString()}</span>
    `;
    row.insertBefore(mini,row.firstChild);
    const btn=document.createElement('button');
    btn.className='ibtn'+(equipped?' owned':'');
    if(s.owned){
      btn.textContent=equipped?'✓ ACTIVE':'EQUIP';
      btn.onclick=()=>{
        activeShip=s;
        playerSprite=makePlayerCanvas(s);
        updateHUD();
        renderHangar(panel);
        schedSave();
      };
    }else{
      btn.textContent=totalCoins>=s.cost?'BUY':'—';
      btn.disabled=totalCoins<s.cost;
      btn.onclick=()=>{
        if(totalCoins<s.cost)return;
        totalCoins-=s.cost;
        s.owned=true;
        activeShip=s;
        playerSprite=makePlayerCanvas(s);
        renderHangar(panel);
        updateHUD();
        schedSave();
      };
    }
    row.appendChild(btn);
    el.appendChild(row);
  });
}

function updateShopBtns(panel){
  const sg=panel.querySelector('#s-gold');
  if(sg)sg.textContent=totalCoins.toLocaleString();
}

function buyUp(id,cost){
  if(totalCoins<cost)return;
  totalCoins-=cost;
  if(id==='bombs')ups.bombs++;
  else if(id==='nukes')ups.nukes++;
  else if(id==='lives')ups.lives++;
  else ups[id]=true;
  sfxPick();
  updateHUD();
  schedSave();
  showPanel('shop');
}

function selectDiff(d){
  settings.difficulty=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));
  event.target.classList.add('selected');
  updateHUD();
  schedSave();
}

function setResolution(r){
  settings.resolution=r;
  initCanvas();
  rebuildBg();
  initStars();
  schedSave();
  showPanel('settings');
}

function setControl(c){
  settings.controlScheme=c;
  schedSave();
  showPanel('settings');
}

function changeUsername(){
  const input=document.getElementById('new-username');
  if(input&&input.value.trim()){
    username=input.value.trim();
    document.getElementById('user-name').textContent=username;
    saveUserData();
    showPanel('profile');
  }
}

function changeAvatar(a){
  userAvatar=a;
  document.getElementById('user-avatar').textContent=a;
  saveUserData();
  showPanel('profile');
}

function startGame(){
  if(animId)cancelAnimationFrame(animId);
  hideOverlay();
  gameState='play';
  multiplayerMode=false;
  if(!bgStars||bgStars.length===0)initStars();
  resetGame();
  initAC();
  startMusic();
  setMsg('Controls: Mouse/WASD · [B]Bomb · [N]Nuke');
  gameLoop();
}

function startMultiplayer(){
  alert('Local 2-player mode: Player 1 uses WASD, Player 2 uses Arrow Keys!');
  startGame();
  multiplayerMode=true;
  // In multiplayer, add player2 logic here (simplified for now)
}

// ── CONTROLS ─────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(AC&&AC.state==='suspended')AC.resume();
  if(e.key==='Escape'&&gameState==='play'){
    gameState='menu';
    cancelAnimationFrame(animId);
    stopMusic();
    showPanel('menu');
    menuLoop();
  }
});
document.addEventListener('keyup',e=>keys[e.key]=false);

cv.addEventListener('mousemove',e=>{
  isTouching=false;
  const r=cv.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*(W/r.width);
  mouseY=(e.clientY-r.top)*(H/r.height);
  if(AC&&AC.state==='suspended')AC.resume();
},{passive:true});

cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  isTouching=true;
  const r=cv.getBoundingClientRect();
  const t=e.touches[0];
  if(player){
    player.x=(t.clientX-r.left)*(W/r.width);
    player.y=(t.clientY-r.top)*(H/r.height);
  }
},{passive:false});

cv.addEventListener('click',()=>{
  if(AC&&AC.state==='suspended')AC.resume();
});

// ── INIT ─────────────────────────────────────────────────
loadGame();
playerSprite=makePlayerCanvas(activeShip);
updateHUD();
initStars();
gameState='menu';
showPanel('menu');
menuLoop();
setInterval(()=>{if(gameState==='play')saveGame();},30000);
</script>
</body>
</html>
